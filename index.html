<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>11-ern</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F5F0E8;
      --surface: #FFFFFF;
      --primary: #2C5F2E;
      --primary-dark: #1e4320;
      --danger: #8B2020;
      --text: #1A1A1A;
      --text-muted: #6B6B6B;
      --border: #D4C9B0;
      --radius: 12px;
      --radius-sm: 8px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }

    #app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Views ─────────────────────────────── */
    .view { display: none; flex-direction: column; flex: 1; }
    .view.active { display: flex; }

    /* ── Header ─────────────────────────────── */
    .app-header {
      background: var(--primary);
      color: #fff;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }
    .app-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .app-header .subtitle {
      font-size: 0.875rem;
      opacity: 0.8;
    }
    .header-right { display: flex; align-items: center; gap: 0.5rem; }

    /* ── Main content ─────────────────────── */
    .view-main {
      flex: 1;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    /* ── Footer ─────────────────────────────── */
    .view-footer {
      padding: 1rem 1.25rem;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    /* ── Buttons ─────────────────────────────── */
    button {
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
      border: none;
      border-radius: var(--radius-sm);
      min-height: 44px;
      padding: 0.5rem 1rem;
      transition: background 0.15s, opacity 0.15s;
    }
    button:active { opacity: 0.8; }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      font-weight: 600;
      width: 100%;
    }
    .btn-primary:hover { background: var(--primary-dark); }

    .btn-secondary {
      background: rgba(255,255,255,0.2);
      color: #fff;
      font-size: 0.875rem;
      min-height: 36px;
      padding: 0.375rem 0.75rem;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.3); }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      font-size: 0.875rem;
      text-align: center;
      width: 100%;
      min-height: 36px;
    }
    .btn-ghost:hover { background: var(--border); }

    /* ── Inputs ─────────────────────────────── */
    input[type="text"], input[type="number"] {
      font-family: inherit;
      font-size: 1rem;
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.625rem 0.75rem;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--primary); }
    input.error { border-color: var(--danger); }

    .field-error {
      font-size: 0.8rem;
      color: var(--danger);
      margin-top: 0.25rem;
    }

    /* ── Setup view ─────────────────────────── */
    .section-label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .stepper {
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      width: fit-content;
    }
    .stepper button {
      background: transparent;
      color: var(--primary);
      font-size: 1.5rem;
      font-weight: 400;
      width: 52px;
      min-height: 52px;
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .stepper button:hover { background: var(--bg); }
    .stepper-value {
      font-size: 1.25rem;
      font-weight: 700;
      min-width: 52px;
      text-align: center;
      padding: 0 0.25rem;
    }

    .player-name-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .player-name-row {
      display: flex;
      flex-direction: column;
    }
    .player-name-row label {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
    }
    .player-name-row input { width: 100%; }

    /* ── Round entry view ─────────────────────── */
    .round-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .round-badge {
      font-size: 0.875rem;
      font-weight: 600;
      opacity: 0.9;
    }

    .player-score-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .player-score-row {
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 0.75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      border: 1px solid var(--border);
    }
    .player-score-row .player-info {
      flex: 1;
      min-width: 0;
    }
    .player-score-row .player-name {
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-score-row .player-total {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .player-score-row .score-input {
      width: 80px;
      text-align: center;
      font-size: 1.25rem;
      font-weight: 600;
      padding: 0.5rem;
      flex-shrink: 0;
    }
    /* hide number spinners */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }

    /* ── Level info in round entry ─────────── */
    .player-level-info {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.15rem;
    }
    .level-cleared-label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.875rem;
      margin-top: 0.4rem;
      cursor: pointer;
      user-select: none;
    }
    .level-cleared-check {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
      cursor: pointer;
      flex-shrink: 0;
    }

    /* ── Nivå-oversikt section ──────────────── */
    .level-overview {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }
    .level-overview-header {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      padding: 0.5rem 1rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .level-overview-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: start;
      gap: 0.75rem;
      padding: 0.6rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .level-overview-row:last-child { border-bottom: none; }
    .level-overview-name {
      font-weight: 600;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .level-overview-desc {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.1rem;
    }
    .level-overview-badge {
      background: var(--primary);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      white-space: nowrap;
      align-self: center;
    }
    .level-overview-badge.level-done {
      background: var(--text-muted);
    }

    /* ── Modal ─────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.5rem;
      max-width: 320px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .modal-box p { font-size: 1rem; line-height: 1.4; }
    .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .btn-danger {
      background: var(--danger);
      color: #fff;
      font-weight: 600;
      width: 100%;
      min-height: 44px;
    }
    .btn-danger:hover { background: #6e1a1a; }
  </style>
</head>
<body>
<div id="app">

  <!-- VIEW 1: Setup -->
  <div id="view-setup" class="view">
    <div class="app-header">
      <div>
        <h1>11-ern</h1>
        <p class="subtitle">Nytt spill</p>
      </div>
    </div>
    <div class="view-main">
      <div>
        <p class="section-label">Antall spillere</p>
        <div class="stepper">
          <button id="players-dec" aria-label="Færre spillere">−</button>
          <span class="stepper-value" id="player-count-display">4</span>
          <button id="players-inc" aria-label="Flere spillere">+</button>
        </div>
      </div>
      <div>
        <p class="section-label">Spillernavn</p>
        <div class="player-name-list" id="player-name-list"></div>
      </div>
      <button class="btn-primary" id="btn-start-game">Start spill</button>
    </div>
  </div>

  <!-- VIEW 2: Round Entry -->
  <div id="view-round" class="view">
    <div class="app-header">
      <h1>11-ern</h1>
      <span class="round-badge" id="round-badge">Runde 1</span>
    </div>
    <div class="view-main">
      <p class="section-label">Poeng denne runden</p>
      <div class="player-score-list" id="player-score-list"></div>
      <div id="round-submit-error" class="field-error" style="display:none"></div>
      <button class="btn-primary" id="btn-submit-round">Registrer runde</button>
      <div id="level-overview-section"></div>
    </div>
    <div class="view-footer">
      <button class="btn-ghost" id="btn-new-game-round">Nytt spill</button>
    </div>
  </div>

</div>

<!-- Confirmation modal -->
<div class="modal-overlay" id="modal-confirm" role="dialog" aria-modal="true" aria-labelledby="modal-text">
  <div class="modal-box">
    <p id="modal-text">Start nytt spill? Nåværende spill vil bli slettet.</p>
    <div class="modal-actions">
      <button class="btn-danger" id="modal-yes">Ja, start nytt spill</button>
      <button class="btn-ghost" id="modal-no">Avbryt</button>
    </div>
  </div>
</div>

<script>
  // ── Constants ───────────────────────────────────────
  const STORAGE_KEY = '11ern_state';
  const MIN_PLAYERS = 2;
  const MAX_PLAYERS = 8;
  const LEVELS = [
    { n: 1,  desc: 'Serie på 4',           trump: 0 },
    { n: 2,  desc: 'Tress 2 ganger',       trump: 1 },
    { n: 3,  desc: 'Serie på 4 + tress',   trump: 1 },
    { n: 4,  desc: 'Serie på 5',           trump: 2 },
    { n: 5,  desc: 'Tress 3 ganger',       trump: 2 },
    { n: 6,  desc: 'Serie på 5 + tress',   trump: 2 },
    { n: 7,  desc: 'Serie på 7',           trump: 2 },
    { n: 8,  desc: 'Serie på 6 + tress',   trump: 3 },
    { n: 9,  desc: 'Serie på 4, 2 ganger', trump: 2 },
    { n: 10, desc: '5 like 2 ganger',      trump: 4 },
    { n: 11, desc: 'Serie på 9',           trump: 4 },
  ];

  // ── State ───────────────────────────────────────────
  let state = defaultState();

  function defaultState() {
    return {
      view: 'setup',
      playerCount: 4,       // only used in setup
      players: [],          // [{ name }]
      rounds: [],           // [[score0, score1, ...], ...]
      playerLevels: [],     // [1, 2, ...] — current level (1-11) per player
    };
  }

  // ── Persistence ─────────────────────────────────────
  function saveState() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
  }

  function loadSavedState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      const s = JSON.parse(raw);
      if (!s || !Array.isArray(s.players) || s.players.length < MIN_PLAYERS) return null;
      // Backwards compat: populate playerLevels if missing
      if (!Array.isArray(s.playerLevels) || s.playerLevels.length !== s.players.length) {
        s.playerLevels = new Array(s.players.length).fill(1);
      }
      return s;
    } catch { return null; }
  }

  // ── Computation ─────────────────────────────────────
  function getTotals() {
    return state.players.map((_, i) =>
      state.rounds.reduce((sum, round) => sum + (round[i] ?? 0), 0)
    );
  }

  // ── Navigation ──────────────────────────────────────
  function showView(viewId) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + viewId).classList.add('active');
    state.view = viewId;
    saveState();
    renders[viewId]();
  }

  // ── Render: Setup ───────────────────────────────────
  function renderSetup() {
    document.getElementById('player-count-display').textContent = state.playerCount;
    const list = document.getElementById('player-name-list');
    const existing = list.querySelectorAll('input');
    const oldValues = Array.from(existing).map(el => el.value);

    list.innerHTML = '';
    for (let i = 0; i < state.playerCount; i++) {
      const row = document.createElement('div');
      row.className = 'player-name-row';
      const label = document.createElement('label');
      label.textContent = `Spiller ${i + 1}`;
      label.htmlFor = `pname-${i}`;
      const input = document.createElement('input');
      input.type = 'text';
      input.id = `pname-${i}`;
      input.placeholder = `Spiller ${i + 1}`;
      input.value = oldValues[i] ?? '';
      input.autocomplete = 'off';
      row.appendChild(label);
      row.appendChild(input);
      list.appendChild(row);
    }
  }

  // ── Render: Round ───────────────────────────────────
  function renderRound() {
    const roundNum = state.rounds.length + 1;
    document.getElementById('round-badge').textContent = `Runde ${roundNum}`;
    document.getElementById('round-submit-error').style.display = 'none';

    const totals = getTotals();
    const sortedIndices = state.players
      .map((_, i) => i)
      .sort((a, b) => totals[a] - totals[b]);

    const list = document.getElementById('player-score-list');
    list.innerHTML = '';

    sortedIndices.forEach(i => {
      const p = state.players[i];
      const row = document.createElement('div');
      row.className = 'player-score-row';

      const info = document.createElement('div');
      info.className = 'player-info';

      const nameEl = document.createElement('div');
      nameEl.className = 'player-name';
      nameEl.textContent = p.name;

      const totalEl = document.createElement('div');
      totalEl.className = 'player-total';
      totalEl.textContent = roundNum > 1 ? `Total: ${totals[i]}` : '';

      const lvl = LEVELS[(state.playerLevels[i] ?? 1) - 1];
      const levelInfoEl = document.createElement('div');
      levelInfoEl.className = 'player-level-info';
      levelInfoEl.textContent = `Nivå ${lvl.n}: ${lvl.desc} · maks ${lvl.trump} trumf`;

      const clearedId = `cleared-${i}`;
      const clearedLabel = document.createElement('label');
      clearedLabel.className = 'level-cleared-label';
      clearedLabel.htmlFor = clearedId;
      const clearedCheck = document.createElement('input');
      clearedCheck.type = 'checkbox';
      clearedCheck.className = 'level-cleared-check';
      clearedCheck.id = clearedId;
      clearedCheck.dataset.playerIndex = i;
      const clearedText = document.createTextNode('Klarte nivået');
      clearedLabel.appendChild(clearedCheck);
      clearedLabel.appendChild(clearedText);

      info.appendChild(nameEl);
      info.appendChild(totalEl);
      info.appendChild(levelInfoEl);
      info.appendChild(clearedLabel);

      const input = document.createElement('input');
      input.type = 'number';
      input.inputMode = 'numeric';
      input.className = 'score-input';
      input.dataset.playerIndex = i;
      input.value = '';
      input.placeholder = '0';
      input.min = '0';

      row.appendChild(info);
      row.appendChild(input);
      list.appendChild(row);
    });

    renderLevelOverview();

    // Keyboard navigation: Enter advances to next input or submits
    const inputs = list.querySelectorAll('.score-input');
    inputs.forEach((input, i) => {
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
          e.preventDefault();
          if (i < inputs.length - 1) inputs[i + 1].focus();
          else submitRound();
        }
      });
    });

    if (inputs.length > 0) inputs[0].focus();
  }

  function renderLevelOverview() {
    const section = document.getElementById('level-overview-section');
    section.innerHTML = '';

    const container = document.createElement('div');
    container.className = 'level-overview';

    const header = document.createElement('div');
    header.className = 'level-overview-header';
    header.textContent = 'Nivåoversikt';
    container.appendChild(header);

    // Sort by level descending (highest level first), then by name
    const sorted = state.players
      .map((p, i) => ({ name: p.name, level: state.playerLevels[i] ?? 1 }))
      .sort((a, b) => b.level - a.level || a.name.localeCompare(b.name));

    sorted.forEach(entry => {
      const lvl = LEVELS[entry.level - 1];
      const done = entry.level >= LEVELS.length;

      const row = document.createElement('div');
      row.className = 'level-overview-row';

      const leftCol = document.createElement('div');
      const nameEl = document.createElement('div');
      nameEl.className = 'level-overview-name';
      nameEl.textContent = entry.name;
      const descEl = document.createElement('div');
      descEl.className = 'level-overview-desc';
      descEl.textContent = `${lvl.desc} · maks ${lvl.trump} trumf`;
      leftCol.appendChild(nameEl);
      leftCol.appendChild(descEl);

      const badge = document.createElement('span');
      badge.className = 'level-overview-badge' + (done ? ' level-done' : '');
      badge.textContent = done ? `Nivå ${lvl.n} ✓` : `Nivå ${lvl.n}`;

      row.appendChild(leftCol);
      row.appendChild(badge);
      container.appendChild(row);
    });

    section.appendChild(container);
  }

  const renders = { setup: renderSetup, round: renderRound };

  // ── Actions ─────────────────────────────────────────
  function startGame() {
    const inputs = document.querySelectorAll('#player-name-list input');
    let valid = true;
    const names = [];
    inputs.forEach(input => {
      const val = input.value.trim();
      if (!val) {
        input.classList.add('error');
        valid = false;
      } else {
        input.classList.remove('error');
        names.push(val);
      }
    });
    if (!valid) return;

    state.players = names.map(name => ({ name }));
    state.rounds = [];
    state.playerLevels = new Array(names.length).fill(1);
    saveState();
    showView('round');
  }

  function submitRound() {
    const inputs = document.querySelectorAll('#player-score-list .score-input');
    const errorEl = document.getElementById('round-submit-error');
    const scores = new Array(state.players.length);
    let valid = true;

    inputs.forEach(input => {
      const pi = parseInt(input.dataset.playerIndex, 10);
      const raw = input.value.trim();
      if (raw === '') {
        input.classList.add('error');
        valid = false;
      } else {
        const n = parseInt(raw, 10);
        if (isNaN(n) || n < 0) {
          input.classList.add('error');
          valid = false;
        } else {
          input.classList.remove('error');
          scores[pi] = n;
        }
      }
    });

    if (!valid) {
      errorEl.textContent = 'Fyll inn poeng (0 eller mer) for alle spillere.';
      errorEl.style.display = '';
      return;
    }

    errorEl.style.display = 'none';
    state.rounds.push(scores);

    // Advance levels for players who cleared their level
    document.querySelectorAll('.level-cleared-check').forEach(cb => {
      const pi = parseInt(cb.dataset.playerIndex, 10);
      if (cb.checked && (state.playerLevels[pi] ?? 1) < LEVELS.length) {
        state.playerLevels[pi]++;
      }
    });

    saveState();
    showView('round');
  }

  function resetGame() {
    state = defaultState();
    saveState();
    showView('setup');
  }

  // ── Modal ───────────────────────────────────────────
  function showConfirmModal() {
    document.getElementById('modal-confirm').classList.add('open');
    document.getElementById('modal-yes').focus();
  }

  function hideConfirmModal() {
    document.getElementById('modal-confirm').classList.remove('open');
  }

  // ── Event Binding ────────────────────────────────────
  function bindEvents() {
    // Setup: stepper
    document.getElementById('players-dec').addEventListener('click', () => {
      if (state.playerCount > MIN_PLAYERS) {
        state.playerCount--;
        renderSetup();
      }
    });
    document.getElementById('players-inc').addEventListener('click', () => {
      if (state.playerCount < MAX_PLAYERS) {
        state.playerCount++;
        renderSetup();
      }
    });

    // Setup: start
    document.getElementById('btn-start-game').addEventListener('click', startGame);

    // Round: submit
    document.getElementById('btn-submit-round').addEventListener('click', submitRound);

    // Round: new game
    document.getElementById('btn-new-game-round').addEventListener('click', showConfirmModal);

    // Modal
    document.getElementById('modal-yes').addEventListener('click', () => {
      hideConfirmModal();
      resetGame();
    });
    document.getElementById('modal-no').addEventListener('click', hideConfirmModal);
    document.getElementById('modal-confirm').addEventListener('click', e => {
      if (e.target === e.currentTarget) hideConfirmModal();
    });
  }

  // ── Init ─────────────────────────────────────────────
  function init() {
    bindEvents();
    const saved = loadSavedState();
    if (saved) {
      state = { ...defaultState(), ...saved };
      // Ensure playerCount is set from saved players
      if (state.players.length >= MIN_PLAYERS) {
        state.playerCount = state.players.length;
      }
      const savedView = state.view === 'standings' ? 'round' : (state.view || 'setup');
      showView(savedView);
    } else {
      showView('setup');
    }
  }

  document.addEventListener('DOMContentLoaded', init);
</script>
